<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://qrdldhhcebervlmlwfbx.supabase.co/storage/v1/object/public/Inked%20Draw%20Images/id-logo-b.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inked Draw — Private Digital Humidor and Premium Cigar Tracker</title>
    <meta name="description" content="Inked Draw is a private digital humidor app for premium cigar collectors, tasting notes, rare cigar cataloging, cigar band scanning, and private cigar lounge discovery." />
    <meta name="keywords" content="digital humidor app, premium cigar tracker, private cigar lounge locator, rare cigar catalog, cigar tasting journal, cigar collection app" />
    <!-- Google Fonts for Preset B (Midnight Luxe) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#FAF8F5] text-[#0D0D12] overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Global Noise Overlay -->
    <svg style="display: none;">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.05" />
        </feComponentTransfer>
      </filter>
    </svg>
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; filter: url(#noiseFilter); opacity: 0.05;"></div>
  </body>
</html>
